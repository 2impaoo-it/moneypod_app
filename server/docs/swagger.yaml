basePath: /api/v1
definitions:
  handlers.AddExpenseRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      group_id:
        type: string
      image_url:
        type: string
      payer_id:
        type: string
      split_details:
        items:
          $ref: '#/definitions/services.SplitItem'
        type: array
    required:
    - amount
    - group_id
    - payer_id
    type: object
  handlers.AddMemberReq:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  handlers.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  handlers.ConfirmDebtPaymentRequest:
    properties:
      receive_wallet_id:
        type: string
    required:
    - receive_wallet_id
    type: object
  handlers.CreateBudgetRequest:
    properties:
      amount:
        type: number
      category:
        type: string
      month:
        maximum: 12
        minimum: 1
        type: integer
      year:
        minimum: 2020
        type: integer
    required:
    - amount
    - category
    - month
    - year
    type: object
  handlers.CreateGroupRequest:
    properties:
      description:
        type: string
      members:
        items:
          $ref: '#/definitions/services.CreateMemberInput'
        minItems: 1
        type: array
      name:
        type: string
    required:
    - members
    - name
    type: object
  handlers.CreateTransactionRequest:
    properties:
      amount:
        type: number
      category:
        type: string
      note:
        type: string
      type:
        enum:
        - income
        - expense
        type: string
      wallet_id:
        description: 'SỬA: uint -> uuid.UUID'
        type: string
    required:
    - amount
    - type
    - wallet_id
    type: object
  handlers.CreateWalletRequest:
    properties:
      balance:
        type: number
      name:
        type: string
    required:
    - name
    type: object
  handlers.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handlers.JoinGroupRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  handlers.LinkPhoneReq:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  handlers.RejectDebtPaymentRequest:
    properties:
      reason:
        type: string
    type: object
  handlers.RequestDebtPaymentRequest:
    properties:
      note:
        type: string
      payment_wallet_id:
        type: string
    required:
    - payment_wallet_id
    type: object
  handlers.SavingsActionReq:
    properties:
      amount:
        type: number
      wallet_id:
        type: string
    required:
    - amount
    - wallet_id
    type: object
  handlers.TransferRequest:
    properties:
      amount:
        type: number
      from_wallet_id:
        type: string
      note:
        type: string
      to_wallet_id:
        type: string
    required:
    - amount
    - from_wallet_id
    - to_wallet_id
    type: object
  handlers.UpdateAvatarReq:
    properties:
      avatar_url:
        type: string
    required:
    - avatar_url
    type: object
  handlers.UpdateBudgetRequest:
    properties:
      amount:
        type: number
      category:
        type: string
    type: object
  handlers.UpdateExpenseRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      image_url:
        type: string
      split_details:
        items:
          $ref: '#/definitions/services.SplitItem'
        type: array
    type: object
  handlers.UpdateFCMTokenRequest:
    properties:
      fcm_token:
        type: string
    required:
    - fcm_token
    type: object
  handlers.UpdateGoalRequest:
    properties:
      color:
        type: string
      deadline:
        description: ISO format string
        type: string
      icon:
        type: string
      name:
        type: string
      target_amount:
        type: number
    type: object
  handlers.UpdateGroupRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  handlers.UpdateProfileReq:
    properties:
      full_name:
        type: string
    required:
    - full_name
    type: object
  handlers.UpdateTransactionRequest:
    properties:
      amount:
        type: number
      category:
        type: string
      note:
        type: string
      type:
        type: string
    type: object
  handlers.UpdateWalletRequest:
    properties:
      currency:
        type: string
      name:
        type: string
    type: object
  models.SavingsGoal:
    properties:
      color:
        description: Màu hiển thị (Hex code)
        type: string
      created_at:
        type: string
      current_amount:
        description: Hiện có
        type: number
      deadline:
        description: Ngày hết hạn (Optional)
        type: string
      icon:
        type: string
      id:
        description: ID là UUID, tự động sinh ngẫu nhiên khi tạo mới
        type: string
      is_overdue:
        description: "\U0001F525 TRƯỜNG ẢO (Virtual Field): Không lưu vào DB, chỉ
          dùng để trả về JSON"
        type: boolean
      name:
        type: string
      status:
        description: IN_PROGRESS, COMPLETED
        type: string
      target_amount:
        description: 'Mục tiêu (VD: 50tr)'
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  services.CreateMemberInput:
    properties:
      user_id:
        description: Có thể là UUID hoặc Số điện thoại
        type: string
    type: object
  services.SplitItem:
    properties:
      amount:
        type: number
      user_id:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@moneypod.com
    name: Tiger Nau (Project Manager)
  description: API Server for MoneyPod Application (Expense Tracker & Savings).
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: MoneyPod API
  version: "1.0"
paths:
  /budgets:
    get:
      consumes:
      - application/json
      description: Lấy danh sách ngân sách theo tháng và năm (query params)
      parameters:
      - description: Tháng (1-12)
        in: query
        name: month
        type: integer
      - description: Năm
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Danh sách ngân sách
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lấy danh sách ngân sách
      tags:
      - Budget
    post:
      consumes:
      - application/json
      description: Tạo ngân sách cho một danh mục trong tháng/năm cụ thể
      parameters:
      - description: Thông tin ngân sách
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateBudgetRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Tạo ngân sách thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Tạo ngân sách mới
      tags:
      - Budget
  /budgets/{id}:
    delete:
      consumes:
      - application/json
      description: Xóa một ngân sách theo ID
      parameters:
      - description: ID ngân sách
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Xóa thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ hoặc lỗi xóa
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xóa ngân sách
      tags:
      - Budget
    get:
      consumes:
      - application/json
      description: Lấy thông tin chi tiết của một ngân sách theo ID
      parameters:
      - description: ID ngân sách
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Chi tiết ngân sách
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Không tìm thấy ngân sách
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lấy chi tiết ngân sách
      tags:
      - Budget
    put:
      consumes:
      - application/json
      description: Cập nhật thông tin ngân sách (số tiền và danh mục)
      parameters:
      - description: ID ngân sách
        in: path
        name: id
        required: true
        type: string
      - description: Thông tin cần cập nhật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateBudgetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Cập nhật thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cập nhật ngân sách
      tags:
      - Budget
  /change-password:
    put:
      consumes:
      - application/json
      description: Thay đổi mật khẩu của người dùng (yêu cầu mật khẩu cũ)
      parameters:
      - description: Mật khẩu cũ và mật khẩu mới
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Đổi mật khẩu thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Mật khẩu cũ sai hoặc dữ liệu không hợp lệ
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Đổi mật khẩu
      tags:
      - Auth
  /dashboard:
    get:
      consumes:
      - application/json
      description: Trả về toàn bộ dữ liệu tổng quan của trang chủ (số dư, giao dịch
        gần đây, thống kê...)
      produces:
      - application/json
      responses:
        "200":
          description: Dữ liệu Dashboard
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lấy dữ liệu tổng quan Dashboard
      tags:
      - Dashboard
  /fcm-token:
    put:
      consumes:
      - application/json
      description: Cập nhật Firebase Cloud Messaging token cho người dùng để nhận
        thông báo push
      parameters:
      - description: FCM Token từ Firebase
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateFCMTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Cập nhật thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cập nhật FCM Token
      tags:
      - Auth
  /forgot-password:
    post:
      consumes:
      - application/json
      description: Gửi mật khẩu tạm thời qua email khi quên mật khẩu
      parameters:
      - description: Email đăng ký
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Gửi mật khẩu tạm thời thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Email không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi hệ thống
          schema:
            additionalProperties: true
            type: object
      summary: Quên mật khẩu
      tags:
      - Auth
  /groups:
    get:
      consumes:
      - application/json
      description: Lấy tất cả các nhóm mà người dùng tham gia
      produces:
      - application/json
      responses:
        "200":
          description: Danh sách nhóm
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lấy danh sách nhóm
      tags:
      - Group
    post:
      consumes:
      - application/json
      description: Tạo nhóm chia tiền với danh sách thành viên ban đầu
      parameters:
      - description: Thông tin nhóm và danh sách thành viên
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Tạo nhóm thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Chưa xác thực
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Tạo nhóm mới
      tags:
      - Group
  /groups/{id}:
    delete:
      consumes:
      - application/json
      description: Xóa nhóm (chỉ Trưởng nhóm mới có quyền)
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Xóa nhóm thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Không đủ quyền
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xóa nhóm
      tags:
      - Group
    get:
      consumes:
      - application/json
      description: Lấy thông tin chi tiết của một nhóm
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Thông tin nhóm
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Không tìm thấy nhóm
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lấy chi tiết nhóm
      tags:
      - Group
    put:
      consumes:
      - application/json
      description: Cập nhật tên và mô tả nhóm (chỉ Trưởng nhóm)
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      - description: Thông tin cần cập nhật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Cập nhật thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Không đủ quyền
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cập nhật thông tin nhóm
      tags:
      - Group
  /groups/{id}/debts/debts-to-me:
    get:
      consumes:
      - application/json
      description: Lấy danh sách các khoản nợ mà người khác nợ tôi trong nhóm
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Danh sách nợ
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xem ai nợ tôi
      tags:
      - Group
  /groups/{id}/debts/my-debts:
    get:
      consumes:
      - application/json
      description: Lấy danh sách các khoản nợ mà tôi đang nợ người khác trong nhóm
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Danh sách nợ
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xem các khoản nợ của tôi
      tags:
      - Group
  /groups/{id}/expenses:
    get:
      consumes:
      - application/json
      description: Lấy danh sách tất cả các hóa đơn chi tiêu của nhóm
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Danh sách hóa đơn
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Lỗi server
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xem lịch sử chi tiêu nhóm
      tags:
      - Group
  /groups/{id}/leave:
    post:
      consumes:
      - application/json
      description: Thành viên tự rời khỏi nhóm
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Rời nhóm thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ hoặc lỗi khác
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Rời nhóm
      tags:
      - Group
  /groups/{id}/members:
    post:
      consumes:
      - application/json
      description: Thêm thành viên mới vào nhóm bằng số điện thoại (chỉ Leader)
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      - description: Số điện thoại thành viên
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AddMemberReq'
      produces:
      - application/json
      responses:
        "200":
          description: Thêm thành viên thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu không hợp lệ hoặc số điện thoại chưa đăng ký
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Thêm thành viên mới
      tags:
      - Group
  /groups/{id}/members/{user_id}:
    delete:
      consumes:
      - application/json
      description: Leader xóa một thành viên ra khỏi nhóm
      parameters:
      - description: ID nhóm
        in: path
        name: id
        required: true
        type: string
      - description: ID thành viên cần xóa
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Xóa thành viên thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ID không hợp lệ
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Không đủ quyền
          schema:
            additionalProperties: true
            type: object
